name: mart_marketing
version: 1.0.0
config-version: 2

profile: dbt_demo

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
docs-paths: ["models/docs"]

clean-targets:
  - target
  - dbt_packages

# `dev_schema` is REQUIRED in every project — see macros/generate_schema_name.sql.
vars:
  dev_schema: ""

on-run-start:
  - "{{ log('mart_marketing on-run-start target=' ~ target.name, info=True) }}"
on-run-end:
  - "{{ log('mart_marketing on-run-end target=' ~ target.name, info=True) }}"

models:
  mart_marketing:
    +persist_docs:
      relation: true
      columns: true
    +meta:
      domain: marketing
      owner: data-marketing
    staging:
      +materialized: view
      +schema: source_data
      +tags: ["marketing", "staging"]
      +docs:
        node_color: "#8FBC8F"
    intermediate:
      +materialized: view
      +schema: transform
      +tags: ["marketing", "intermediate"]
      +docs:
        node_color: "#F0E68C"
    marts:
      +materialized: table
      +schema: mart
      +tags: ["marketing", "marts"]
      +docs:
        node_color: "#87CEEB"

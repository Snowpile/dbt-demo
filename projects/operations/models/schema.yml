version: 2

models:
  # --- staging (views) ---
  - name: operations_stg_orders
    description: Cleaned orders with store and USD total.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_total_usd
        tests: [not_negative]
  - name: operations_stg_order_items
    description: One row per order line item.
    columns:
      - name: order_item_id
        tests: [unique, not_null]
  - name: operations_stg_products
    description: Product catalog (name + type).
    columns:
      - name: sku
        tests: [unique, not_null]
  - name: operations_stg_supplies
    description: Bill-of-materials rows (supply per product).
    columns:
      - name: cost_usd
        tests: [not_negative]
  - name: operations_stg_stores
    description: Store dimension with tax rate.
    columns:
      - name: store_id
        tests: [unique, not_null]
  - name: operations_stg_store_targets
    description: Daily order target per store (from seed).
    columns:
      - name: store_name
        tests: [unique, not_null]

  # --- intermediate ---
  - name: operations_int_orders_enriched
    description: Orders enriched with store name and item count.
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: operations_int_store_daily_orders
    description: Per-store per-day order/item/revenue roll-up.
    columns:
      - name: order_count
        tests: [not_negative]
  - name: operations_int_product_supply_needs
    description: Supply requirements per product (table).
    columns:
      - name: sku
        tests: [unique, not_null]
  - name: operations_int_order_supply_consumption
    description: Supplies consumed per order (perishable split).
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: operations_int_store_performance
    description: Daily store order count vs target attainment.
    columns:
      - name: order_count
        tests: [not_negative]
      - name: revenue_usd
        tests: [not_negative]
  - name: operations_int_perishable_usage
    description: Daily perishable vs total supply units consumed.
    columns:
      - name: order_date
        tests: [unique, not_null]

  # --- marts ---
  - name: operations_fct_orders
    description: Incremental order fact for operations (delete+insert on ordered_at).
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: item_count
        tests: [not_negative]
  - name: operations_fct_store_daily
    description: Store-day operational metrics vs target.
    columns:
      - name: store_day_id
        tests: [unique, not_null]
      - name: revenue_usd
        tests: [not_negative]
  - name: operations_dim_stores
    description: Store dimension with tenure and daily target.
    columns:
      - name: store_id
        tests: [unique, not_null]

seeds:
  - name: operations_store_targets
    description: Reference seed - daily order target per store.
    columns:
      - name: store_name
        tests: [unique, not_null]

version: 2

models:
  - name: operations_stg_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: operations_stg_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
  - name: operations_int_orders_enriched
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: operations_fct_orders
    description: Enriched order fact for fulfillment tracking
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'return_pending', 'returned']
  - name: operations_dim_fulfillment_status
    description: Fulfillment status dimension with order volumes
    columns:
      - name: fulfillment_status
        tests: [unique, not_null]

name: finance
version: 1.0.0
config-version: 2

profile: benderik

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

# Project vars: overridable at runtime with `dbt build --vars '{revenue_start_date: "2025-01-01"}'`.
vars:
  # Earliest order date to include in revenue models. Default predates the sample
  # data, so nothing is filtered out unless a tighter value is supplied.
  revenue_start_date: "2000-01-01"

models:
  finance:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table

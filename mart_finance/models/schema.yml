version: 2

models:
  # --- staging (views) ---
  - name: finance_stg_orders
    description: Cleaned order financials (money converted cents -> USD).
    columns:
      - name: order_id
        description: '{{ doc("order_id") }}'
        tests: [unique, not_null]
      - name: customer_id
        description: '{{ doc("customer_id") }}'
      - name: store_id
        description: '{{ doc("store_id") }}'
      - name: ordered_at
        description: '{{ doc("ordered_at") }}'
      - name: order_date
        description: '{{ doc("order_date") }}'
      - name: order_total_usd
        tests: [not_negative]
  - name: finance_stg_order_items
    description: One row per order line item.
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        description: '{{ doc("order_id") }}'
        tests:
          - relationships:
              arguments:
                to: ref('finance_stg_orders')
                field: order_id
      - name: sku
        description: '{{ doc("sku") }}'
        tests:
          - relationships:
              arguments:
                to: ref('finance_stg_products')
                field: sku
  - name: finance_stg_products
    description: Product catalog with USD price.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: product_type
        tests:
          - not_empty_string:
              config:
                store_failures: true
          - accepted_values:
              arguments:
                values: ['jaffle', 'beverage']
              config:
                docs:
                  show: true
  - name: finance_stg_supplies
    description: Bill-of-materials rows (supply per product).
    columns:
      - name: cost_usd
        tests: [not_negative]
  - name: finance_stg_stores
    description: Store dimension with tax rate.
    columns:
      - name: store_id
        tests: [unique, not_null]
  - name: finance_stg_margin_targets
    description: Target gross margin by product type (from seed).
    columns:
      - name: product_type
        tests: [unique, not_null]

  # --- intermediate ---
  - name: finance_int_product_margin
    description: Per-product price, BOM cost, and margin vs target.
    columns:
      - name: sku
        tests: [unique, not_null]
      - name: unit_cost_usd
        tests: [not_negative]
  - name: finance_int_order_items_costed
    description: Line items enriched with product price/cost (table).
    columns:
      - name: order_item_id
        tests: [unique, not_null]
  - name: finance_int_order_costs
    description: Per-order item cost roll-up.
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: finance_int_order_financials
    description: Order-grain revenue, COGS, and gross profit.
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: finance_int_store_tax
    description: Expected vs actual tax per order, by store rate.
    columns:
      - name: order_id
        tests: [unique, not_null]
  - name: finance_int_daily_revenue
    description: Per-store per-day revenue, COGS, and gross profit roll-up.
    columns:
      - name: revenue_usd
        tests: [not_negative]
      - name: order_count
        tests: [not_negative]

  # --- incremental parents + changed-id union (demo: incr-of-incr) ---
  - name: finance_int_orders_delta
    description: Incremental order-grain delta parent (feeds changed_order_ids).
    config:
      meta:
        role: incremental_parent
    columns:
      - name: order_id
        description: '{{ doc("order_id") }}'
        tests: [unique, not_null]
      - name: ordered_at
        description: '{{ doc("ordered_at") }}'
  - name: finance_int_order_items_delta
    description: Incremental item-grain delta parent (feeds changed_order_ids).
    config:
      meta:
        role: incremental_parent
    columns:
      - name: order_item_id
        tests: [unique, not_null]
      - name: order_id
        description: '{{ doc("order_id") }}'
      - name: sku
        description: '{{ doc("sku") }}'
  - name: finance_int_changed_order_ids
    description: >
      Unions order_ids from both incremental delta parents so downstream
      incrementals can filter to keys that need work.
    config:
      tags: ['finance', 'intermediate', 'changed_ids']
      meta:
        role: changed_id_union
    columns:
      - name: order_id
        description: '{{ doc("order_id") }}'
        tests: [unique, not_null]

  # --- marts ---
  - name: finance_fct_order_revenue
    description: '{{ doc("finance_fct_order_revenue") }}'
    config:
      # schema.yml-level config override example (tags merge with model/project).
      meta:
        grain: order
        demo_features: [incremental_of_incrementals, pre_hook, shared_docs]
    tests:
      # dbt_utils package test: order total can never be below its subtotal.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "order_total_usd >= subtotal_usd"
    columns:
      - name: order_id
        description: '{{ doc("order_id") }}'
        tests: [unique, not_null]
      - name: customer_id
        description: '{{ doc("customer_id") }}'
      - name: store_id
        description: '{{ doc("store_id") }}'
        tests:
          - relationships:
              arguments:
                to: ref('finance_stg_stores')
                field: store_id
      - name: ordered_at
        description: '{{ doc("ordered_at") }}'
      - name: order_date
        description: '{{ doc("order_date") }}'
      - name: order_total_usd
        tests: [not_null, not_negative]
      - name: gross_margin_pct
        description: '{{ doc("gross_margin_pct") }}'
        tests:
          - accepted_range:
              arguments:
                min_value: 0
                max_value: 1
  - name: finance_fct_daily_revenue
    description: Daily revenue / profit per store.
    config:
      meta:
        demo_features: [post_hook]
    tests:
      # dbt_utils package test: one row per store per day.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [store_id, order_date]
    columns:
      - name: daily_revenue_id
        tests: [unique, not_null]
      - name: revenue_usd
        tests: [not_negative]
      - name: loaded_at
        description: Stamped by post_hook after each run (null in SELECT, set via UPDATE).
  - name: finance_dim_product
    description: Product dimension with cost, margin, and target flag.
    columns:
      - name: product_key
        tests: [unique, not_null]

seeds:
  - name: finance_margin_targets
    description: Reference seed - target gross margin by product type.
    columns:
      - name: product_type
        tests: [unique, not_null]

version: 2

sources:
  - name: raw
    description: Jaffle Shop raw app tables (dbt-labs/jaffle-shop, jafgen sample)
    schema: raw
    tables:
      - name: raw_orders
        description: One row per order. Money columns in cents.
        # Thresholds tuned for the static jafgen sample (newest order ~2025-08).
        loaded_at_field: "cast(ordered_at as timestamp)"
        freshness:
          warn_after: {count: 365, period: day}
          error_after: {count: 730, period: day}
      - name: raw_items
        description: One row per order line item (order_id -> sku).
      - name: raw_products
        description: Product catalog. price in cents.
      - name: raw_supplies
        description: Bill of materials per product (sku). cost in cents.
      - name: raw_stores
        description: Store dimension with tax_rate.

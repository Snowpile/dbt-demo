name: mart_finance
version: 1.0.0
config-version: 2

profile: dbt_demo

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - target
  - dbt_packages

# Project vars (override at runtime: dbt run --vars '{"dev_schema":"dev"}').
# `dev_schema` is REQUIRED pattern in every project — see macros/generate_schema_name.sql.
vars:
  revenue_start_date: "2000-01-01"
  # Empty = off. Set via --vars for --defer sandbox builds (see demo C7).
  dev_schema: ""
  # Retention window used by finance_fct_order_revenue pre_hook DELETE (demo DML).
  order_retention_years: 50

# Appears in warehouse query history / DuckDB logs when supported.
query-comment: "mart_finance target={{ target.name }} node={{ node.name if node is defined else 'n/a' }}"

# Prefer project macros over package macros of the same name when dispatching.
dispatch:
  - macro_namespace: dbt
    search_order: ["mart_finance", "dbt"]

# Project-level run hooks (demo cold-start). After the warehouse is initialized,
# remove on-run-start / on-run-end — durable DDL/grants live in
# scripts/sql/architectural_ddl.sql (run once per env, not every dbt invocation).
# Model-level: pre_hook on finance_fct_order_revenue, post_hook on
# finance_fct_daily_revenue (separate models for the demo).
on-run-start:
  - "{{ log('mart_finance on-run-start target=' ~ target.name, info=True) }}"
  - |
    create schema if not exists audit;
    create table if not exists audit.dbt_model_hooks (
      event_at timestamp,
      invocation_id varchar,
      model_name varchar,
      event_type varchar,
      row_count bigint,
      note varchar
    );
on-run-end:
  - "{{ log('mart_finance on-run-end target=' ~ target.name, info=True) }}"

# Layer defaults. Node-level config() / schema.yml can override.
# DuckDB N/A (document only): grants, partition_by, cluster_by — warehouse-native elsewhere.
# Config catalog demos: models/_showcase/ (merge, append, microbatch, contract, versions, …).
models:
  mart_finance:
    +persist_docs:
      relation: true
      columns: true
    +meta:
      domain: finance
      owner: data-finance
    staging:
      +materialized: view
      +schema: source_data
      +tags: ["finance", "staging"]
      +docs:
        node_color: "#8FBC8F"
    intermediate:
      +materialized: view
      +schema: transform
      +tags: ["finance", "intermediate"]
      +docs:
        node_color: "#F0E68C"
    marts:
      +materialized: table
      +schema: mart
      +tags: ["finance", "marts"]
      +docs:
        node_color: "#87CEEB"
    _showcase:
      +schema: showcase
      +tags: ["finance", "showcase"]
      +docs:
        node_color: "#DDA0DD"

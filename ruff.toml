# Ruff lint + format (replaces Black, isort, Flake8, pylint). SQL: .sqlfluff

target-version = "py311"
line-length = 120
src = ["scripts", "setup.py"]

[lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "RUF",
]

[lint.isort]
known-first-party = ["dbt_demo"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

name: pre-commit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47

      # pre-commit/action@v3.0.1 runs (inside the action, not visible here):
      #   pip install pre-commit
      #   pre-commit run --show-diff-on-failure --color=always --files <changed files>
      # Default extra_args is --all-files; we pass --files so only the PR diff is linted.
      # Uses runner Python — no setup-uv / no repo .venv. Hook envs: .pre-commit-config.yaml.
      - name: Run pre-commit
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --files ${{ steps.changed-files.outputs.all_changed_files }}

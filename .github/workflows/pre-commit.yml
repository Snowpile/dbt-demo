name: pre-commit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47

      # Official pre-commit action (install + cache). Default is --all-files; we pass --files instead.
      # Python lint/format: Ruff only (ruff-check + ruff-format hooks in .pre-commit-config.yaml).
      - name: Run pre-commit
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --files ${{ steps.changed-files.outputs.all_changed_files }}

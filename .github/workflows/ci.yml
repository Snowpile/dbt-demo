name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.json

      - run: ./setup.sh

      - name: Scan seed data integrity
        run: ./scripts/scan_downloads.sh

      - name: Load raw + dbt build (all projects)
        run: ./scripts/dbt_build_all.sh

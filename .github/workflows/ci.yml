name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: ./setup.sh

      - run: ./scripts/bootstrap.sh

      # Manifest-based dbt-checkpoint structural checks (need compiled manifests from bootstrap).
      - name: dbt structural checks (dbt-checkpoint)
        run: |
          for hook in check-script-has-no-table-name \
            check-model-has-description check-model-has-tests; do
            uv run pre-commit run "$hook" --hook-stage manual --all-files
          done

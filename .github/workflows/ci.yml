name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: ./setup.sh

      - name: Scan seed data integrity
        run: ./scripts/scan_downloads.sh

      - name: Load raw + dbt build (all projects)
        run: ./scripts/dbt_build_all.sh

# Manual Slim CI against the latest main `dbt-state` artifact.
# PR gate lives in ci.yml (slim-pr). See docs/defer.md.
name: Slim CI

on:
  workflow_dispatch:
    inputs:
      selector:
        description: dbt state selector
        required: true
        default: state:modified+
        type: string

permissions:
  contents: read
  actions: read

jobs:
  slim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: ./setup.sh

      - name: Download Slim CI baseline from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --branch main \
            --workflow CI \
            --json databaseId,conclusion \
            --limit 20 \
            --jq '[.[] | select(.conclusion=="success")][0].databaseId // empty')
          [[ -n "$RUN_ID" ]] || { echo "No successful main CI run with artifacts"; exit 1; }
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" -n dbt-state -D .
          test -f state/mart_finance/manifest.json
          test -f data/prod.duckdb

      - name: Slim build
        env:
          DBT_STATE_TARGET: prod
          DBT_TARGET: prod
        run: |
          ./scripts/load_raw.sh prod
          # slim_build.sh runs dbt deps per domain before build
          ./scripts/slim_build_all.sh "${{ inputs.selector }}"
